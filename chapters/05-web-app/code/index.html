<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Chapter 5: TODO クライアント</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 36rem; margin: 2rem auto; padding: 0 1rem; }
      h1 { font-size: 1.4rem; }
      input, button { font-size: 1rem; padding: 0.4rem 0.6rem; }
      ul { padding-left: 1.2rem; }
      li { margin: 0.25rem 0; }
      .err { color: #c0392b; white-space: pre-wrap; background: #fdecea; padding: 0.6rem; border-radius: 4px; }
      .muted { color: #777; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <h1>Chapter 5: TODO クライアント</h1>
    <p class="muted">
      この HTML は <code>http://127.0.0.1:5500</code> から配信される想定。<br />
      API は <code>http://127.0.0.1:8000</code>。ポートが違うので <strong>別オリジン</strong>。
    </p>

    <div>
      <input id="name" placeholder="やること（例: 買い物に行く）" size="30" />
      <button id="add">追加</button>
      <button id="reload">再読み込み</button>
    </div>

    <ul id="list"></ul>

    <div id="err" class="err" hidden></div>

    <script>
      const API = "http://127.0.0.1:8000";
      const $list = document.getElementById("list");
      const $name = document.getElementById("name");
      const $err  = document.getElementById("err");

      function showError(e) {
        $err.hidden = false;
        $err.textContent =
          "エラー: " + (e && e.message ? e.message : e) +
          "\n\n（開発者ツールの Console / Network タブも確認してね）";
      }

      function clearError() {
        $err.hidden = true;
        $err.textContent = "";
      }

      async function reload() {
        clearError();
        try {
          const res = await fetch(API + "/items");
          if (!res.ok) throw new Error("GET /items failed: " + res.status);
          const items = await res.json();
          $list.innerHTML = "";
          for (const it of items) {
            const li = document.createElement("li");
            li.textContent = `#${it.id}: ${it.name}`;
            const btn = document.createElement("button");
            btn.textContent = "削除";
            btn.style.marginLeft = "0.5rem";
            btn.onclick = () => remove(it.id);
            li.appendChild(btn);
            $list.appendChild(li);
          }
        } catch (e) {
          showError(e);
        }
      }

      async function add() {
        clearError();
        const name = $name.value.trim();
        if (!name) return;
        try {
          const res = await fetch(API + "/items", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name }),
          });
          if (!res.ok) throw new Error("POST /items failed: " + res.status);
          $name.value = "";
          await reload();
        } catch (e) {
          showError(e);
        }
      }

      async function remove(id) {
        clearError();
        try {
          const res = await fetch(API + "/items/" + id, { method: "DELETE" });
          if (!res.ok) throw new Error("DELETE failed: " + res.status);
          await reload();
        } catch (e) {
          showError(e);
        }
      }

      document.getElementById("add").onclick = add;
      document.getElementById("reload").onclick = reload;
      reload();
    </script>
  </body>
</html>
